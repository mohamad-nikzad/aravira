name: Main DB

on:
  pull_request:
    paths:
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'scripts/check-db-schema-sync.mjs'
      - 'packages/database/drizzle.config.ts'
      - 'packages/database/src/schema.ts'
      - 'packages/database/src/migrations/**'
      - '.github/workflows/main-db.yml'
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  check-schema:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm db:check

  migrate-main:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: check-schema
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL_MAIN }}
      DATABASE_URL_DIRECT: ${{ secrets.DATABASE_URL_DIRECT_MAIN }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Verify main database secrets
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "Missing GitHub Actions secret DATABASE_URL_MAIN"
            exit 1
          fi

      - name: Apply checked-in migrations to main
        run: pnpm --filter @repo/database db:migrate
