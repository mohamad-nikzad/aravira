name: API Benchmark

on:
  workflow_dispatch:
    inputs:
      stack:
        description: Stack tag for this run (e.g. nextjs-api-routes, hono-node, hono-bun)
        required: true
        default: nextjs-api-routes
        type: string
      scenario:
        description: Single scenario file (without .js), or "all"
        required: true
        default: all
        type: string

jobs:
  bench:
    runs-on: ubuntu-latest
    env:
      BASE_URL: https://saluna.vercel.app
      STACK: ${{ inputs.stack }}
      BENCH_PHONE: ${{ secrets.BENCH_PHONE || '09120000000' }}
      BENCH_PASSWORD: ${{ secrets.BENCH_PASSWORD || 'admin123' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install k6
        run: |
          sudo gpg -k
          sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install -y k6

      - name: Run benchmarks
        run: |
          chmod +x benchmarks/run.sh
          if [ "${{ inputs.scenario }}" = "all" ]; then
            ./benchmarks/run.sh
          else
            ./benchmarks/run.sh "${{ inputs.scenario }}"
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-${{ inputs.stack }}-${{ github.run_id }}
          path: benchmarks/results/
          retention-days: 90

      - name: Print summary
        if: always()
        run: |
          BASELINE="benchmarks/results/prod/${{ inputs.stack }}/BASELINE.md"
          if [ -f "$BASELINE" ]; then
            cat "$BASELINE" >> "$GITHUB_STEP_SUMMARY"
          fi
